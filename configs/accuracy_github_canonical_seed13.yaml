# Local-method comparison using GitHub LONGNEW/-26CASES-HoRU preprocessing/splits.
# Dataset adapter source is pinned at main commit c6a65d7e442705e5d7b7d2a33c7a68d129d32864.
datasets: [ucihar, isolet, femnist, wisdm, synthetic, ninapro]
methods: [fedhdc, hyperfeel, horu]
seeds: [13]
# USER_SPECIFIED: retain the T006 training budget; this is not GitHub's 50-round benchmark.
rounds: 25
participation: 1.0
local_epochs: 3
batch_size: 32
hd_dim: 2000
hd_learning_rate: 0.035
device: cuda
horu: {common_rank: 24, global_rank: 8, personal_rank: 64, eta_shared: 0.035, eta_personal: 0.035, eta_global: 0.035}
canonical_preprocessing:
  repository: LONGNEW/-26CASES-HoRU
  commit: c6a65d7e442705e5d7b7d2a33c7a68d129d32864
  adapter_file: /home/longnew/data/projects/horu/canonical_main_c6a65d7/our_hd/data.py
  datasets:
    ucihar:
      adapter: UCIHARAdapter
      source_paths: {uci_har: /home/longnew/data/projects/horu/canonical_preprocessing/uci/UCI HAR Dataset}
      kwargs: {root: /home/longnew/data/projects/horu/canonical_preprocessing/uci/UCI HAR Dataset, test_size: 0.3, min_client_samples: 10, limit_clients: 30, normalization: l2, preserve_original_split: false}
    isolet:
      adapter: ISOLETAdapter
      source_paths: {isolet: /home/longnew/data/projects/horu/isolet-artifact-input-6bc15a4/data/raw/isolet}
      kwargs: {root: /home/longnew/data/projects/horu/isolet-artifact-input-6bc15a4/data/raw/isolet, num_clients: 8, alpha: 5.0, test_size: 0.3, min_client_samples: 10, normalization: l2, preserve_original_split: false, seed: 13}
    femnist:
      adapter: FEMNISTAdapter
      source_paths: {femnist: /home/longnew/data/datasets/horu-reconstruction-femnist-verified/source/leaf/data/femnist/data}
      kwargs: {root: /home/longnew/data/datasets/horu-reconstruction-femnist-verified/source/leaf/data/femnist/data, limit_clients: 200, cache_dir: /home/longnew/data/projects/horu/canonical_preprocessing/femnist_adapter_cache, selection_seed: 13, min_client_samples: 20, normalization: l2}
    wisdm:
      adapter: WISDMAdapter
      source_paths: {wisdm_archive: /home/longnew/data/datasets/horu-reconstruction-wisdm-verified/source/data/tiers/on_device_hdc/wisdm/wisdm-dataset.zip}
      kwargs: {root: /home/longnew/data/datasets/horu-reconstruction-wisdm-verified/source/data/tiers/on_device_hdc/wisdm/wisdm-dataset.zip, wisdm_modality: phone_accel, test_size: 0.3, min_client_samples: 20, limit_clients: 51, normalization: standardize, seed: 13, max_train_samples_per_client: 5000, max_test_samples_per_client: 1000}
    synthetic:
      adapter: SyntheticAdapter
      source_paths: {synthetic_train: /home/longnew/data/projects/horu/canonical_main_c6a65d7/data/leaf_synthetic/data/train/data_niid_0_keep_20_train_6.json, synthetic_test: /home/longnew/data/projects/horu/canonical_main_c6a65d7/data/leaf_synthetic/data/test/data_niid_0_keep_20_test_6.json}
      kwargs: {root: /home/longnew/data/projects/horu/canonical_main_c6a65d7/data/leaf_synthetic/data, min_client_samples: 10, normalization: none, seed: 13}
    ninapro:
      adapter: NinaProDB1Adapter
      source_paths: {ninapro: /home/longnew/data/datasets/horu-reconstruction-ninapro-verified/source/data/tiers/on_device_hdc/ninapro_db1}
      kwargs: {root: /home/longnew/data/datasets/horu-reconstruction-ninapro-verified/source/data/tiers/on_device_hdc/ninapro_db1, ninapro_modality: emg_glove, test_size: 0.3, min_client_samples: 20, limit_clients: 27, normalization: standardize, seed: 13, max_train_samples_per_client: 5000, max_test_samples_per_client: 1000}
